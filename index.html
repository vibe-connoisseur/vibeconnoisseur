<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#111310" />
    <meta name="description" content="A live map of events worth crossing London for." />
    <title>Vibe Connoisseur — London after dark</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700;800&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" integrity="sha256-p4NxAoJBhIIN+hmNHrzRCf9tD/miZyoHS5obTRR9BMY=" crossorigin="" />
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <main class="map-page">
      <div id="map" aria-label="Dark map of London events"></div>

      <header class="topbar">
        <a class="wordmark" href="#" aria-label="Vibe Connoisseur home">
          <span>VIBE</span><span>CONNOISSEUR</span>
        </a>
        <p class="edition">London field notes <span>/</span> Live from the sheet</p>
        <button class="icon-button" id="refreshButton" type="button" aria-label="Refresh events">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M20 11a8 8 0 1 0-2.3 5.7M20 4v7h-7" /></svg>
        </button>
      </header>

      <section class="intro-panel" aria-labelledby="pageTitle">
        <p class="eyebrow"><span class="live-dot"></span> London, currently</p>
        <h1 id="pageTitle">Good reasons<br />to go <em>out.</em></h1>
        <p class="intro-copy">A small, live index of parties, gatherings and culture happening across the city.</p>
        <div class="status-row">
          <p id="syncStatus" role="status" aria-live="polite">Reading the guest list...</p>
          <p><span id="resultCount">0</span> plotted</p>
        </div>
      </section>

      <nav class="filter-bar" id="categoryFilters" aria-label="Filter events by type"></nav>

      <section class="event-rail" aria-label="Events">
        <div class="rail-heading">
          <p>On the map</p>
          <p id="lastUpdated">Syncing now</p>
        </div>
        <div class="event-list" id="eventList"></div>
        <div class="empty-state" id="emptyState" hidden>
          <p>No pins here yet.</p>
          <button type="button" id="resetFilters">Show everything</button>
        </div>
      </section>

      <button class="mobile-list-toggle" id="listToggle" type="button" aria-expanded="false">
        <span>Explore the list</span><span id="mobileResultCount">0</span>
      </button>

      <div class="map-coordinate" aria-hidden="true">51.5072° N<br />0.1276° W</div>
    </main>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js" integrity="sha256-20nQCchB9co0qIjJZRGuk2/Z9VM+kNiyxNV1lvTlZBo=" crossorigin=""></script>
    <script src="app.js" defer></script>
  </body>
</html>
